version: '3.8'

services:
  # =========================================================
  # MySQL principal — usado pelo backend NestJS via Prisma
  # =========================================================
  mysql:
    image: mysql:8.0.36
    container_name: crm_mysql
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # NÃO expor porta para a rede externa
    # Se precisar acessar localmente: use 127.0.0.1:3306
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - crm_network

  # =========================================================
  # Redis — usado por BullMQ do NestJS
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # NÃO expor porta para a rede externa
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # =========================================================
  # WAHA — WhatsApp HTTP API
  # =========================================================
  waha:
    image: devlikeapro/waha:latest
    container_name: crm_waha
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Engine do WhatsApp
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      
      # Chave de API (OBRIGATÓRIA no .env)
      WAHA_API_KEY: ${WAHA_API_KEY}
      
      # QR Code no console (útil para debug)
      WAHA_PRINT_QR: 'true'
      
      # Nível de log
      WAHA_LOG_LEVEL: info
      
      # Armazenamento de sessões
      WAHA_SESSION_STORE_TYPE: FILE
      
      # Credenciais do Dashboard (OBRIGATÓRIAS no .env)
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      
      # Credenciais do Swagger (OBRIGATÓRIAS no .env)
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
    
    volumes:
      - waha_sessions:/app/.sessions
    
    depends_on:
      redis:
        condition: service_healthy
    
    networks:
      - crm_network

  # =========================================================
  # BACKEND — NestJS
  # =========================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WAHA_URL: ${WAHA_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET}
      # ... outras variáveis do .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      waha:
        condition: service_started
    volumes:
      - ./backend/src:/app/src  # Hot reload em desenvolvimento
    networks:
      - crm_network

volumes:
  mysql_data:
  redis_data:
  waha_sessions:

networks:
  crm_network:
    driver: bridge


